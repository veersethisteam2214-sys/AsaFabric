      <stop offset="0%" stop-color="#dcd2c1"/>
      <stop offset="52%" stop-color="#c2b6a4"/>
      <stop offset="100%" stop-color="#9f947f"/>
    </linearGradient>
    <radialGradient id="sfan7" cx="26%" cy="18%" r="85%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vfan7" cx="50%" cy="50%" r="75%">
