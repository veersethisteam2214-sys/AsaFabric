<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Woven fabric swatch">
  <defs>
    <linearGradient id="gfan6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#646e66"/>
      <stop offset="52%" stop-color="#46514a"/>
      <stop offset="100%" stop-color="#2c352f"/>
    </linearGradient>
    <radialGradient id="sfan6" cx="26%" cy="18%" r="85%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vfan6" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.34"/>
    </radialGradient>
    <pattern id="wfan6" width="8" height="8" patternUnits="userSpaceOnUse">
